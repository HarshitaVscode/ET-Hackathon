* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #eee; font-family: sans-serif; padding: 12px; }

.ev-item { display: flex; align-items: flex-start; margin: 4px 0; font-size: 10px; color: #aaa; }
.ev-bullet { margin-right: 6px; }
.action-card { border-radius: 8px; padding: 12px; border-left: 3px solid; }
.action-title { font-size: 12px; color: #8899aa; font-weight: bold; margin-bottom: 6px; }
.action-text { font-size: 12px; color: #ddd; }

var sel = document.getElementById("hs-select");
hotspot_data.forEach(function(h, i) {
    var opt = document.createElement("option");
    opt.value = i;
    opt.text = h.location + " (" + h.state + ")";
    sel.appendChild(opt);
});

function updatePanel() {
    var idx = parseInt(sel.value);
    var h = hotspot_data[idx];
    if (!h) return;
    var sc = getSrcColor(h.most_probable_cause);
    var ac = getAQIColor(h.aqi);
    var svc = SEV_COLORS[h.severity_label] || "#eab308";
    var tc = {"Improving":"#22c55e","Stable":"#eab308","Worsening":"#dc2626"}[h.forecast_trend] || "#eab308";
    var pd = h.probability_distribution || {};
    var pts = Object.keys(pd).sort(function(a,b){return pd[b]-pd[a]}).slice(0,8);
    var probBars = pts.map(function(s) {
        var p = pd[s];
        var c = getSrcColor(s);
        var l = SOURCE_LABELS[s] || s.replace(/_/g," ").replace(/\b\w/g,function(m){return m.toUpperCase()});
        return '<div class="flex" style="margin:3px 0"><span style="width:90px;font-size:10px;color:#aaa">'+l+'</span><div class="bar-bg"><div class="bar" style="width:'+p+'%;background:'+c+'"></div></div><span style="width:40px;text-align:right;font-size:10px;color:#fff">'+p.toFixed(0)+'%</span></div>';
    }).join("");
    var ev = h.top_evidence || [];
    var fi = ev.length ? ev.slice(0,5) : ["High PM2.5 ("+(h.pm25||0)+")","AQI "+h.aqi+" - "+h.severity_label,"Wind: "+(h.wind_speed||0)+" km/h","Temp: "+(h.temperature||0)+" C","Fires: "+(h.fire_count||0)];
    var fiHtml = fi.map(function(f){return '<div style="font-size:10px;color:#aaa;padding:2px 0">\u25b8 '+f+'</div>'}).join("");
    var ei = ["Satellite detection of "+h.dominant_pollutant+" at "+h.location,"Source attribution: "+h.confidence.toFixed(1)+"% confidence in "+h.most_probable_cause.replace(/_/g," ").replace(/\b\w/g,function(m){return m.toUpperCase()})];
    if (h.wind_speed) ei.push("Wind pattern ("+h.wind_speed+" km/h) supports source attribution");
    if (h.nearest_sources && h.nearest_sources.length) ei.push("Nearby sources: "+h.nearest_sources.slice(0,3).join(", "));
    ei.push("Forecast: "+h.forecast_trend+" trend expected");
    var evChain = ei.map(function(e){return '<div class="ev-item"><span class="ev-bullet" style="color:'+sc+'">\u25b8</span><span>'+e+'</span></div>'}).join("");
    var pols = [["AQI",h.aqi.toFixed(0)],["PM2.5",h.pm25.toFixed(0)],["PM10",(h.pm10||0).toFixed(2)],["NO2",(h.no2||0).toFixed(6)],["SO2",(h.so2||0).toFixed(6)],["CO",(h.co||0).toFixed(6)],["HCHO",(h.hcho||0).toFixed(6)],["O3",(h.o3||0).toFixed(6)],["NH3",(h.nh3||0).toFixed(6)],["Aerosol",(h.aerosol_index||0).toFixed(4)]];
    var polTable = pols.map(function(p){return '<tr><td>'+p[0]+'</td><td>'+p[1]+'</td></tr>'}).join("");
    var nearHtml = "";
    if (h.nearest_sources && h.nearest_sources.length) {
        nearHtml = '<div class="card"><div class="card-title">NEARBY EMISSION SOURCES</div><div style="font-size:10px;color:#aaa">'+h.nearest_sources.slice(0,5).join(", ")+'</div></div>';
    }
    document.getElementById("panel").innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
        '<h3 style="color:#fff;margin:0;font-size:16px">Explainable AI: '+h.location+'</h3>'+
        '<div style="display:flex;gap:8px">'+
        '<span style="background:#1a1a3a;color:#889;padding:4px 12px;border-radius:12px;font-size:11px">'+h.state+'</span>'+
        '<span style="background:'+svc+'22;color:'+svc+';padding:4px 12px;border-radius:12px;font-size:11px;border:1px solid '+svc+'">'+h.severity_label+'</span></div></div>'+
        '<div class="row"><div class="col">'+
        '<div class="card"><div class="card-title">SOURCE ATTRIBUTION</div>'+
        '<div class="flex" style="margin-bottom:6px"><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:'+sc+'"></span>'+
        '<span style="font-size:15px;color:#fff;font-weight:bold">'+h.most_probable_cause.replace(/_/g," ").replace(/\b\w/g,function(m){return m.toUpperCase()})+'</span></div>'+
        '<div class="stat">Confidence: <b>'+h.confidence.toFixed(1)+'%</b></div>'+
        '<div class="stat">Risk Level: <b style="color:'+svc+'">'+h.severity_label+'</b></div>'+
        '<div class="stat">Forecast: <b style="color:'+tc+'">'+h.forecast_trend+'</b></div>'+
        '<div class="stat">Location: '+h.lat.toFixed(3)+'N, '+h.lon.toFixed(3)+'E</div></div>'+
        '<div class="card"><div class="card-title">PROBABILITY DISTRIBUTION</div>'+probBars+'</div>'+
        '<div class="card"><div class="card-title">SHAP FEATURE IMPORTANCE</div>'+
        '<div style="font-size:10px;color:#667;margin-bottom:6px">Top influencing factors</div>'+fiHtml+'</div></div>'+
        '<div class="col">'+
        '<div class="card"><div class="card-title">EVIDENCE CHAIN</div>'+evChain+'</div>'+
        '<div class="card"><div class="card-title">POLLUTANT LEVELS</div><table>'+polTable+'</table></div>'+
        nearHtml+
        '<div class="action-card" style="background:linear-gradient(135deg,#1a1a3a,#111125);border-left-color:'+sc+'">'+
        '<div class="action-title">RECOMMENDED ENFORCEMENT ACTION</div>'+
        '<div class="action-text">'+h.recommendation+'</div>'+
        '<div class="action-auth">Responsible Authority: <span>'+h.authority+'</span></div></div></div></div>';
}
updatePanel();
</script>
