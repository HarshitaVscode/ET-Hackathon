name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run ruff
        run: ruff check backend/ agents/ ingestion/ decision-engine/ knowledge-graph/ llm-service/ tests/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Check TypeScript
        run: npx tsc --noEmit

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e backend/
      - name: Install required runtime deps
        run: |
          pip install pydantic pydantic-settings fastapi uvicorn httpx python-dotenv structlog tenacity orjson networkx
      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio pytest-timeout
          pip install numpy pandas scikit-learn torch --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Install optional deps (allow failure)
        run: |
          pip install causalnex rasterio strawberry-graphql || echo "Some optional deps failed (continuing)"
      - name: Debug - import src.config
        run: python -c "from src.config import config; print('config OK')"
      - name: Debug - test collection
        run: |
          python -m pytest tests/ --collect-only -q 2>&1 || true
        continue-on-error: true
      - name: Debug - run test_ingestion only
        run: |
          python -m pytest tests/test_ingestion.py -v --tb=long 2>&1 || true
        continue-on-error: true
      - name: Debug - run test_agents first test
        run: |
          python -m pytest "tests/test_agents.py::TestGraphCastAdapter::test_model_initialization" -v --tb=long -s 2>&1 || true
        continue-on-error: true
      - name: Run some tests to GitHub Summary
        run: |
          {
            echo "### Test Collection"
            echo '```'
            python -m pytest tests/ --collect-only -q 2>&1
            echo '```'
            echo ""
            echo "### test_ingestion"
            echo '```'
            python -m pytest tests/test_ingestion.py -v --tb=long 2>&1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true
      - name: Run tests
        run: python -m pytest tests/ -v --tb=long -x --timeout=120

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
