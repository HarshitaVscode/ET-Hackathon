groups:
  - name: vayu_alerts
    rules:
      - alert: HighAQI
        expr: avg_over_time(aqi_forecast{job="vayu-forecast-agent"}[1h]) > 300
        for: 2h
        labels:
          severity: critical
        annotations:
          summary: "Sustained high AQI above 300"
          description: "Average AQI has been above 300 for 2 hours. Consider activating GRAP-3."

      - alert: IngestionDown
        expr: up{job="vayu-ingestion"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Ingestion service is down"
          description: "Data ingestion has been down for 5 minutes."

      - alert: BurnDetected
        expr: burn_events_total{job="vayu-burn-agent"} > 0
        labels:
          severity: warning
        annotations:
          summary: "Active fire detected"
          description: "VIIRS thermal anomaly detected active fire."

      - alert: ForecastDrift
        expr: abs(aqi_forecast - aqi_actual) > 50
        for: 6h
        labels:
          severity: warning
        annotations:
          summary: "Forecast model drift detected"
          description: "Forecast error consistently above 50 AQI points."
